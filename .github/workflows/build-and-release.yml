name: Build & Release

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

permissions:
  contents: write

env:
  DOTNET_VERSION: '9.0.x'
  SOLUTION: VoiceInput.sln
  APP_PROJECT: src/VoiceInput.App/VoiceInput.App.csproj
  TEST_PROJECT: tests/VoiceInput.Tests/VoiceInput.Tests.csproj
  WIX_SRC: installer/VoiceInput.wxs
  PUBLISH_DIR: publish/win-x64
  MSI_OUTPUT: installer/VoiceInputSetup.msi

jobs:
  build-and-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Build
        run: dotnet build ${{ env.SOLUTION }} --no-restore --configuration Release

      - name: Test
        run: dotnet test ${{ env.TEST_PROJECT }} --no-build --configuration Release --verbosity normal

  publish-msi:
    needs: build-and-test
    runs-on: windows-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      # Determine version from tag or generate from run number
      - name: Set version
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -match 'refs/tags/v(.+)') {
            $ver = $Matches[1]
          } else {
            $ver = "1.0.${{ github.run_number }}.0"
          }
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT
          Write-Host "Version: $ver"

      # Publish self-contained single-file
      - name: Publish
        run: >
          dotnet publish ${{ env.APP_PROJECT }}
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:PublishTrimmed=false
          -p:Version=${{ steps.version.outputs.VERSION }}
          -o ${{ env.PUBLISH_DIR }}

      # Install WiX Toolset
      - name: Install WiX
        shell: pwsh
        run: |
          dotnet tool install --global wix
          wix eula accept wix7
          wix extension add WixToolset.UI.wixext

      # Build MSI
      - name: Build MSI
        shell: pwsh
        run: |
          $env:Path += ";$env:USERPROFILE\.dotnet\tools"
          wix build ${{ env.WIX_SRC }} `
            -ext WixToolset.UI.wixext `
            -d "SourceDir=${{ env.PUBLISH_DIR }}" `
            -o ${{ env.MSI_OUTPUT }}

      # Upload MSI as build artifact (always on master push)
      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: AetherVoice-${{ steps.version.outputs.VERSION }}-win-x64
          path: ${{ env.MSI_OUTPUT }}
          retention-days: 90

      # Upload standalone EXE as artifact too
      - name: Upload EXE artifact
        uses: actions/upload-artifact@v4
        with:
          name: AetherVoice-${{ steps.version.outputs.VERSION }}-portable
          path: ${{ env.PUBLISH_DIR }}/VoiceInput.App.exe
          retention-days: 90

  # Create GitHub Release when a version tag is pushed
  release:
    needs: publish-msi
    runs-on: windows-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore
        run: dotnet restore ${{ env.SOLUTION }}

      - name: Set version
        id: version
        shell: pwsh
        run: |
          "${{ github.ref }}" -match 'refs/tags/v(.+)'
          $ver = $Matches[1]
          echo "VERSION=$ver" >> $env:GITHUB_OUTPUT

      - name: Publish
        run: >
          dotnet publish ${{ env.APP_PROJECT }}
          -c Release -r win-x64 --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:PublishTrimmed=false
          -p:Version=${{ steps.version.outputs.VERSION }}
          -o ${{ env.PUBLISH_DIR }}

      - name: Install WiX
        shell: pwsh
        run: |
          dotnet tool install --global wix
          wix eula accept wix7
          wix extension add WixToolset.UI.wixext

      - name: Build MSI
        shell: pwsh
        run: |
          $env:Path += ";$env:USERPROFILE\.dotnet\tools"
          wix build ${{ env.WIX_SRC }} `
            -ext WixToolset.UI.wixext `
            -d "SourceDir=${{ env.PUBLISH_DIR }}" `
            -o ${{ env.MSI_OUTPUT }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Aether Voice v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            ${{ env.MSI_OUTPUT }}
            ${{ env.PUBLISH_DIR }}/VoiceInput.App.exe
